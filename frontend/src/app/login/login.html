<div class="login-container">
  <div class="login-card card-glass reveal">
    <div class="login-header">
      <span class="sub-label">Secure Access</span>
      <h2>Admin Login</h2>
      <p>Enter your password to access the dashboard.</p>
    </div>

    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input 
            type="password" 
            id="password" 
            name="password"
            [(ngModel)]="password" 
            placeholder="••••••••" 
            required
            autocomplete="current-password"
            [disabled]="loading"
          >
        </div>
      </div>

      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="btn login-btn" [disabled]="loading || !password">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading" class="spinner-small"></span>
      </button>
    </form>
    
    <div class="back-link">
      <a href="/">← Back to Public Site</a>
    </div>
  </div>
</div>
